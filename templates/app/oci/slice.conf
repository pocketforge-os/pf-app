# slice.conf — systemd transient-slice resource limits for this app (rides ALONGSIDE the
# bundle; consumed on-device via `systemd-run --property-from-file`). Maps to cgroup-v2
# controllers the Phase-2 kernel enables. Tune per app; these are conservative handheld
# defaults. Full contract: container-runtime-architecture.md §2.2.
MemoryMax=512M
MemoryHigh=384M
CPUWeight=100
IOWeight=100
TasksMax=512
OOMScoreAdjust=200
# The app is the single fb writer for its lifetime (supervisor hands off fb0). Device access
# is least-privilege: only the nodes a display+input app needs.
DevicePolicy=strict
DeviceAllow=/dev/fb0 rw
DeviceAllow=/dev/dri/renderD128 rw
DeviceAllow=/dev/uinput rw
DeviceAllow=/dev/snd/ rw
